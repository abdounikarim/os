name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1

      - name: Untap pre-installed taps we don't use
        run: brew untap aws/tap

      - name: Lint Makefile
        run: make --dry-run install 2>&1 | head -100

      - name: Syntax-check the Ansible playbook
        run: |
          brew install ansible
          ansible-playbook ansible/playbook.yml --syntax-check

      - name: Sanity-check each role tag
        run: |
          for role in common git zsh php js ruby python cleaner; do
            echo "== $role =="
            make --dry-run install-$role
          done

      - name: Run make install for real
        run: make install
