---
# PHP toolchain: interpreter, Composer, Symfony CLI, Box, PhpStorm, Xdebug, Blackfire.

- name: Install/remove PHP taps
  community.general.homebrew_tap:
    name:
      - blackfireio/homebrew-blackfire # https://github.com/blackfireio/homebrew-blackfire
      - box-project/box # https://github.com/box-project/homebrew-box
    state: "{{ pkg_state }}"

- name: Trust PHP-related taps
  ansible.builtin.command: "brew trust {{ item }}"
  loop:
    - symfony-cli/tap
    - box-project/box
    - blackfireio/blackfire
  changed_when: false
  when: pkg_state == 'present'

- name: Install/remove PHP formulae
  community.general.homebrew:
    name:
      - php # https://github.com/php/php-src
      - composer # https://github.com/composer/composer
      - symfony-cli/tap/symfony-cli # https://github.com/symfony-cli/symfony-cli
      - box-project/box/box # https://github.com/box-project/box
    state: "{{ pkg_state }}"

- name: Install/remove PhpStorm
  community.general.homebrew_cask:
    name: phpstorm # https://github.com/JetBrains/intellij-community
    state: "{{ pkg_state }}"

- name: Configure PHP tooling
  when: pkg_state == 'present'
  block:
    - name: Check if Blackfire is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/blackfire
      register: blackfire_installed

    - name: Download Blackfire installer # https://blackfire.io/docs/up-and-running/installation
      ansible.builtin.get_url:
        url: https://installer.blackfire.io/installer.sh
        dest: /tmp/blackfire-install.sh
        mode: "0755"
      when: not blackfire_installed.stat.exists

    - name: Run Blackfire installer (CLI agent + PHP probe)
      ansible.builtin.command: /tmp/blackfire-install.sh
      when: not blackfire_installed.stat.exists

    - name: Register Blackfire PHP probe
      ansible.builtin.command: blackfire php:install
      changed_when: false

    - name: Install Xdebug via PECL # https://xdebug.org
      community.general.pear:
        name: xdebug
        state: present

    - name: Install Symfony plugin for PhpStorm # https://github.com/Haehnchen/idea-php-symfony2-plugin
      ansible.builtin.command: phpstorm installPlugins fr.adrienbrault.idea.symfony2plugin
      changed_when: false
